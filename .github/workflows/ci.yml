name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Typecheck
        run: python -m mypy
      - name: Test
        run: python -m pytest -m "not soak"
      - name: Schema drift check
        run: python -m mcp_server.schema_tools check
      - name: Package hygiene and install smoke check
        run: make package-check

  blender-smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender
          blender --version
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Blender-backed smoke validation
        env:
          BLENDER_MCP_BLENDER_BINARY: /usr/bin/blender
        run: make test-blender-smoke

  load-soak:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Mock-runtime load and soak validation
        run: make test-load