name: release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-version-exports:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Parse release PR metadata
        id: release-pr
        env:
          RELEASE_PLEASE_PR: ${{ needs.release-please.outputs.pr }}
        run: |
          set -euo pipefail
          branch="$(printf '%s' "$RELEASE_PLEASE_PR" | jq -r '.headBranchName // empty')"
          if [ -z "$branch" ]; then
            echo "Release Please did not return a release PR branch." >&2
            exit 1
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout release PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.release-pr.outputs.branch }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Sync exported package versions
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          pattern = re.compile(r'(__version__\s*=\s*["\'])([^"\']+)(["\'])')

          for relative_path in ("mcp_server/__init__.py", "blender_controller/__init__.py"):
              path = Path(relative_path)
              original = path.read_text(encoding="utf-8")
              updated, count = pattern.subn(rf"\g<1>{version}\g<3>", original, count=1)
              if count != 1:
                  raise SystemExit(f"Expected exactly one __version__ assignment in {relative_path}")
              if updated != original:
                  path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit synced version exports
        run: |
          set -euo pipefail
          if git diff --quiet -- mcp_server/__init__.py blender_controller/__init__.py; then
            echo "Exported versions already match pyproject.toml."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcp_server/__init__.py blender_controller/__init__.py
          git commit -m "chore(release): sync package version exports"
          git push origin HEAD:${{ steps.release-pr.outputs.branch }}

  build-release-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout tagged release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.4.4 cyclonedx-bom==7.3.0

      - name: Build source and wheel distributions
        run: python -m build

      - name: Generate release SBOM and checksums
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          python -m venv release-env
          release-env/bin/python -m pip install --upgrade pip
          release-env/bin/python -m pip install dist/*.whl
          cyclonedx-py environment release-env --of JSON --output-file "dist/blender-mcp-${RELEASE_VERSION}-sbom.cdx.json"
          shasum -a 256 dist/* > dist/SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: dist/*

      - name: Upload release assets to workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets-${{ needs.release-please.outputs.version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Attach release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber