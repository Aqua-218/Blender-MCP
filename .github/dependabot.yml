version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    versioning-strategy: "increase-if-necessary"
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
      include: "scope"
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    groups:
      python-runtime:
        dependency-type: "production"
        update-types:
          - minor
          - patch
      python-development:
        dependency-type: "development"
        update-types:
          - minor
          - patch

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - tooling
    commit-message:
      prefix: "chore(pre-commit)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(actions)"