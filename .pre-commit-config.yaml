repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: conventional-commit
        name: conventional commit message
        entry: python scripts/validate_commit_msg.py
        language: system
        stages: [commit-msg]

      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: python -m pytest -m "not soak" -q
        language: system
        pass_filenames: false
        stages: [pre-push]